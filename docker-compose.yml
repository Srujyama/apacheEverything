services:
  sunny:
    build: .
    image: sunny:dev
    container_name: sunny
    ports:
      - "3000:3000"
    volumes:
      - sunny-data:/data
      # Optional: mount a config file. Uncomment to use.
      # - ./sunny.config.yaml:/data/sunny.config.yaml:ro
    environment:
      SUNNY_ADDR: ":3000"
      SUNNY_DATA_DIR: /data
      # Set SUNNY_PASSWORD_HASH (bcrypt) to enable single-password auth.
      # Generate with: docker run --rm sunny:dev sunny-cli hash-password 'yourpw'
      # SUNNY_PASSWORD_HASH: "$2a$10$..."
      # API keys for connectors that need them. Both gracefully idle if unset.
      # SUNNY_SECRET_NASA_FIRMS_KEY: "your-firms-map-key"
      # SUNNY_SECRET_OPENAQ_API_KEY: "your-openaq-key"
    restart: unless-stopped

volumes:
  sunny-data:
