version: "3"

tasks:
  default:
    cmds:
      - task --list

  install:
    desc: Install all dependencies (pnpm + go mod)
    cmds:
      - pnpm install
      - cd apps/server && go mod download
      - cd packages/sdk-go && go mod download
      - cd packages/cli && go mod download

  dev:web:
    desc: Run the web app in dev mode (Vite, port 5173)
    cmds:
      - pnpm --filter @sunny/web dev

  dev:server:
    desc: Run the Go server in dev mode (port 3000)
    dir: apps/server
    cmds:
      - go run ./cmd/sunny

  dev:
    desc: Run web + server concurrently
    deps: [build:web]
    cmds:
      - task: dev:server

  build:web:
    desc: Build the web app to apps/web/dist
    cmds:
      - pnpm --filter @sunny/web build

  sync:web:
    desc: Copy apps/web/dist into the server's embed dir
    deps: [build:web]
    cmds:
      - rm -rf apps/server/internal/web/dist
      - mkdir -p apps/server/internal/web/dist
      - cp -R apps/web/dist/. apps/server/internal/web/dist/

  build:server:
    desc: Build the Go server binary into bin/sunny
    deps: [sync:web]
    cmds:
      - mkdir -p bin
      - cd apps/server && go build -o ../../bin/sunny ./cmd/sunny

  build:
    desc: Build everything
    deps: [build:web, build:server]

  test:
    desc: Run all tests
    cmds:
      - cd apps/server && go test ./...
      - cd packages/sdk-go && go test ./...

  clean:
    desc: Remove build artifacts
    cmds:
      - rm -rf bin apps/web/dist
      - rm -rf apps/server/web/dist

  docker:build:
    desc: Build the Docker image
    cmds:
      - docker build -t sunny:dev .

  docker:up:
    desc: Run via docker compose
    cmds:
      - docker compose up --build
