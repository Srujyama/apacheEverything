apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "sunny.fullname" . }}
  labels: {{- include "sunny.labels" . | nindent 4 }}
spec:
  replicas: 1 # Sunny is single-instance: DuckDB is embedded, single-writer.
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ include "sunny.name" . }}
      app.kubernetes.io/instance: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ include "sunny.name" . }}
        app.kubernetes.io/instance: {{ .Release.Name }}
    spec:
      containers:
        - name: sunny
          image: {{ include "sunny.image" . }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - containerPort: 3000
          env:
            - name: SUNNY_ADDR
              value: ":3000"
            - name: SUNNY_DATA_DIR
              value: "/data"
          {{- if or .Values.auth.passwordHash .Values.auth.sessionKey .Values.secrets.nasaFirmsKey .Values.secrets.openaqApiKey }}
          envFrom:
            - secretRef:
                name: {{ include "sunny.fullname" . }}
          {{- end }}
          livenessProbe:
            httpGet:
              path: /api/health
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /api/health
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 10
          resources: {{- toYaml .Values.resources | nindent 12 }}
          volumeMounts:
            - name: data
              mountPath: /data
      volumes:
        - name: data
          {{- if .Values.persistence.enabled }}
          persistentVolumeClaim:
            claimName: {{ include "sunny.fullname" . }}-data
          {{- else }}
          emptyDir: {}
          {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector: {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations: {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity: {{- toYaml . | nindent 8 }}
      {{- end }}
