# Release: cross-compile binaries, build the Docker image, push everything
# to GitHub Container Registry, and attach binaries to the GitHub release.
#
# Triggered by pushing a semver tag, e.g. `git tag v0.1.0 && git push --tags`.

name: release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write     # for creating GitHub releases
  packages: write     # for pushing to ghcr.io

jobs:
  binaries:
    name: build binaries (${{ matrix.goos }}/${{ matrix.goarch }})
    runs-on: ${{ matrix.runs-on }}
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
            runs-on: ubuntu-latest
            cgo_cc: gcc
          - goos: linux
            goarch: arm64
            runs-on: ubuntu-24.04-arm
            cgo_cc: gcc
          - goos: darwin
            goarch: amd64
            runs-on: macos-latest
            cgo_cc: clang
          - goos: darwin
            goarch: arm64
            runs-on: macos-latest
            cgo_cc: clang
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with: { version: 10 }
      - uses: actions/setup-node@v4
        with: { node-version: "20", cache: pnpm }
      - uses: actions/setup-go@v5
        with: { go-version: "1.25" }

      - name: pnpm install + build web
        run: |
          pnpm install --frozen-lockfile=false
          pnpm --filter @sunny/web build

      - name: sync web dist into server embed
        run: |
          rm -rf apps/server/internal/web/dist
          mkdir -p apps/server/internal/web/dist
          cp -R apps/web/dist/. apps/server/internal/web/dist/

      - name: build sunny
        working-directory: apps/server
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: 1
          CC: ${{ matrix.cgo_cc }}
        run: |
          mkdir -p ../../out
          go build -trimpath -ldflags="-s -w" -o ../../out/sunny ./cmd/sunny

      - name: build sunny-cli
        working-directory: packages/cli
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: 0
        run: |
          go build -trimpath -ldflags="-s -w" -o ../../out/sunny-cli ./cmd/sunny

      - name: package
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          STAGE="sunny_${VERSION}_${{ matrix.goos }}_${{ matrix.goarch }}"
          mkdir -p "out/$STAGE"
          mv out/sunny out/sunny-cli "out/$STAGE/"
          cp README.md LICENSE "out/$STAGE/"
          tar -czf "out/${STAGE}.tar.gz" -C out "$STAGE"
          shasum -a 256 "out/${STAGE}.tar.gz" > "out/${STAGE}.tar.gz.sha256"

      - uses: actions/upload-artifact@v4
        with:
          name: bins-${{ matrix.goos }}-${{ matrix.goarch }}
          path: out/sunny_*.tar.gz*
          retention-days: 7

  docker:
    name: build & push docker image
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3

      - name: Log in to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: derive image tag
        id: tag
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ghcr.io/${{ github.repository }}:${{ steps.tag.outputs.version }}
            ghcr.io/${{ github.repository }}:latest

  release:
    name: github release
    runs-on: ubuntu-latest
    needs: [binaries, docker]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: list artifacts
        run: ls -la artifacts/

      - name: create release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*
          generate_release_notes: true
          fail_on_unmatched_files: true
